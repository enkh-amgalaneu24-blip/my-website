<!DOCTYPE html>
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title> Nostalgia moments </title>
    <link href= "https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&
    family=DM+Sans:wght@300;400;500&display=swap"  rel="stylesheet"/>
    <style>
      *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0; }

      :root{
        --cream: #faf7f2;
        --paper : #f3edef;
        --ink: #2c2416;
        --ink--soft: #6b5d4f;
        --accent: #b07f4a;
        --warm--white: #fffcf7;
        --border: rgba(100,70,30, 0.15);
  
      }
      body{
        background-color: var(--cream);
        color: var(--ink);
        font-family: 'DM Sans', sans-serif;
        min-height: 130vh;

      }
      header{
        background: var(--warm--white);
        border-bottom: 1px solid var(--border);
        padding:  2.5rem 2rem 2rem;
        text-align: center;
        
      }
      .site-title{
        font-family: 'Arthur', Amina;
        font-size: 2.4rem;
        font-weight:600;
        color: var(--ink);
        letter-spacing: -0.5px
      }
      .site-sub {
        font-family: 'Arthur' Amina;
        font-style: italic;
        color: var(--ink--soft);
        font-size: 1rem;
        margin-top: 0.3rem;
      }
      .tagline{
        margin-top: 0.8rem;
        font-size: 0.85rem;
        color: var(--accent);
        letter-spacing: 0.09em;
        text-transform: uppercase;
        font-weight: 500;
  
      }
      main{
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;

      }

      /*Add memory card*/
      .add-cart{
        background-color: var(--warm--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 2.5rem;
      }
      .add-cart h2{
        font-family: 'Arthur', Amina;
        font-size: 1.1rem;
        margin-bottom: 1rem;
        color: var(--inl-soft);
      }
      .form-row{
        display: flex;
        flex-direction: column;
        gap: 0.69rem;
      }
      
      input[type="text"], textarea{
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(-accent-light);
        border-radius: 11px;
        background: var(--cream);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        color:var(--ink);
        outline: none;
        transition: border-color 0.2;
        resize: none;
      }
      input[type="text"]:focus, textarea:focus{
        border-color: var(--accent);
      }

      textarea{ height:98px;}

      .upload-row{
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .upload-label{
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent-light);
        color: var(--ink);
        padding: 0.55rem 1rem;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.2s;
        border: 1px solid var( --border);
      }

      .upload-label:hover{background: #dcc5a0};

      #file-input{display: none;}

      #file-name{
        font-size: 0.83rem;
        color: var(--ink--soft);
        font-style: italic;

      }
      #preview-img{
        display: none;
        margin-top: 1rem;
        max-width: 100%;
      }
      .btn-add{
        margin-top: 0.25rem;
        background: var(--accent);
        color: var(--warm--white);
        border: none;
        padding: 0.65rem 1.5rem;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        align-self: flex-end;
      }
      .btn-add:hover{ background: #8f6245;}
      /* Memories grid */
      .memories-grid{
        display:flex;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.25rem;
      }
      .memory-card{
        background: var(--warm--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        transition: transfrom 0.2s; box-shadow: 0.2s;
        position: relative;
      }
      .memory-card:hover{
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
      }
      .memory-card img{
        width: 100%;
        height: 80px;
        background: var(--paper);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
      }
      .memory-body{
        padding: 0.99rem 1rem 1rem;

      }
      .memory-title{
        font-family: 'Arthur', Amina;
        font-size: 0.97rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.35rem
      }
      .memory-text{
        font-size: 0.8rem;
        color: var(--ink--soft);
        line-height: 1.49;

      }
      .memory-date{
        font-size: 0.77rem;
        color:var(--accent);
        margin-top: 0.6rem;
        font-style: italic;
      }

      .btn-delete{
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(255,252,247,0.99);
        border: 1px solid var(--border);
        width: 26px;
        height: 26px;
        font-size: 0.79rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink--soft);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .memory-card:hover, .btn-delete{ opacity: 1;};
      .btn-delete:hover{ color: #c0392b;}

      /* Empty state */
      .empty-state{
        text-align: center;
        padding: 3rem 1rem;
        color: var(--ink--soft);
        font-style: italic;
        font-family: 'Lora', serif;
        font-size: 1rem;

      }

      footer{
        text-align: center;
        padding: 3rem 1rem;
        color: var(--ink--soft);
        padding: 1.5rem;
        font-style: italic;

      }
      </style>
      </head>
      <body>
        <div class="site-title"></div>Nostalgia</div>
        <div class="site-sub">my little corner</div>
        <div class="tagline">* memories &amp; nostalgia* ></div>
      </header>

      <main>
        <div class="add-cart">
          <h2> Add a memory</h2>
          <div clas="form-row">
            <input type="text" id="mem-title" placeholder="give it a title..." maxlength="80"/>
            <textarea id="mem-text" placaeholder="what do you want to remember about this moment? "></textarea>
            <div class="upload-row">
              <label class="upload-label" for="file-input">
                Upload a photo
              </label>
              <input type="file" id="file-input" accept="image/*"/>
              <span id="file-name"> No photo selected</span>
            </div>
          </div>


        </div class="memories-grid">
        <div class="empty-state"> Your memories will appear here...<br/> Start by adding a new memory above! </div>
      </div>
    </main>
    <footer> made with love.... personal space</footer>

    </script>

    </footer>

      </body>
