<!DOCTYPE html>
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title> Nostalgia moments </title>
    <link href= "https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&
    family=DM+Sans:wght@300;400;500&display=swap"  rel="stylesheet"/>
    <style>
      *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0; }

      :root{
        --cream: #faf7f2;
        --paper : #f3edef;
        --ink: #2c2416;
        --ink--soft: #6b5d4f;
        --accent: #b07f4a;
        --warm--white: #fffcf7;
        --border: rgba(100,70,30, 0.15);
  
      }
      body{
        background-color: var(--cream);
        color: var(--ink);
        font-family: 'DM Sans', sans-serif;
        min-height: 130vh;

      }
      header{
        background: var(--warm--white);
        border-bottom: 1px solid var(--border);
        padding:  2.5rem 2rem 2rem;
        text-align: center;
        
      }
      .site-title{
        font-family: 'Arthur', Amina;
        font-size: 2.4rem;
        font-weight:600;
        color: var(--ink);
        letter-spacing: -0.5px
      }
      .site-sub {
        font-family: 'Arthur' Amina;
        font-style: italic;
        color: var(--ink--soft);
        font-size: 1rem;
        margin-top: 0.3rem;
      }
      .tagline{
        margin-top: 0.8rem;
        font-size: 0.85rem;
        color: var(--accent);
        letter-spacing: 0.09em;
        text-transform: uppercase;
        font-weight: 500;
  
      }
      main{
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }







      






    </style>
    </script>
</body>
</html>
